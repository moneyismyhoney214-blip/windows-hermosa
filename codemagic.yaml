workflows:
  windows-workflow:
    name: Hermosa Windows Build
    instance_type: windows_x2
    max_build_duration: 90
    environment:
      vars:
        FLUTTER_VERSION: "3.41.1"
        BUILD_DIR: "build\\windows\\x64\\runner\\Release"
    scripts:
      - name: Install Flutter 3.41.1 from Git
        script: |
          git clone https://github.com/flutter/flutter.git -b $env:FLUTTER_VERSION --depth 1 C:\flutter
          echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "C:\flutter\bin;" + $env:PATH
          C:\flutter\bin\flutter.bat --version
          C:\flutter\bin\flutter.bat precache --windows
      - name: Flutter doctor
        script: C:\flutter\bin\flutter.bat doctor -v
      - name: Enable Windows desktop
        script: C:\flutter\bin\flutter.bat config --enable-windows-desktop
      - name: Restore NearPay developer cert (optional)
        script: |
          # pubspec.yaml declares assets/certs/ as an asset bundle. The
          # real developer_cert.pem is not committed to the repo; if a
          # Codemagic secure variable named DEVELOPER_CERT_PEM is set,
          # materialize it here so NearPay works in the built binary.
          # Without the env var the build still succeeds (runtime loader
          # catches the missing cert and keeps NearPay disabled).
          New-Item -ItemType Directory -Force -Path assets\certs | Out-Null
          if ($env:DEVELOPER_CERT_PEM) {
            Write-Host "ℹ️ Restoring developer_cert.pem from DEVELOPER_CERT_PEM secret"
            [System.IO.File]::WriteAllText("assets\certs\developer_cert.pem", $env:DEVELOPER_CERT_PEM)
          } else {
            Write-Host "⚠️ DEVELOPER_CERT_PEM not set — NearPay will run disabled in this build."
          }
      - name: Clean project
        script: C:\flutter\bin\flutter.bat clean
      - name: Get Flutter packages
        script: C:\flutter\bin\flutter.bat pub get --verbose
      - name: Static analysis (blocks build on warnings/errors)
        script: C:\flutter\bin\flutter.bat analyze
      - name: Provide sqlite3.dll for tests
        # `flutter test` runs on the Dart VM with no built Flutter app, so
        # the DLL that sqlite3_flutter_libs bundles next to the .exe isn't
        # present, and the offline DB tests fail on Windows with
        # "Couldn't resolve native function 'sqlite3_initialize'".
        # (macOS CI is fine — sqlite3 is a system library there.)
        # Download the official sqlite3 DLL and point the test bootstrap
        # (test/support/sqflite_test_init.dart) at it via SQLITE3_TEST_DLL.
        script: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $ver = "3460100"   # SQLite 3.46.1
          $url = "https://www.sqlite.org/2024/sqlite-dll-win-x64-$ver.zip"
          $zip = "$env:CM_BUILD_DIR\sqlite3.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:CM_BUILD_DIR\sqlite3dll" -Force
          $dll = "$env:CM_BUILD_DIR\sqlite3dll\sqlite3.dll"
          # Also drop a copy in the project root (the test process cwd) as
          # a fallback for the default 'sqlite3.dll' search path.
          Copy-Item $dll -Destination (Get-Location).Path -Force
          echo "SQLITE3_TEST_DLL=$dll" | Out-File -FilePath $env:CM_ENV -Append -Encoding utf8
          Write-Host "sqlite3.dll ready at $dll"
      - name: Unit + widget tests (blocks build on failure)
        # `flutter test` exits non-zero on any failing test, which fails
        # the Codemagic step automatically. Builds NEVER proceed with a
        # broken test suite — that was the gap that let regressions slip
        # into production before this guard.
        script: C:\flutter\bin\flutter.bat test
      - name: Build Windows Release
        script: C:\flutter\bin\flutter.bat build windows --release --verbose
      - name: Set up Windows code signing (optional)
        # If a code signing cert is provided as secure Codemagic env vars,
        # decode it and locate signtool so the sign steps below can run.
        # Mirrors the DEVELOPER_CERT_PEM pattern: when the secret is ABSENT
        # the build still succeeds — it just ships UNSIGNED (SmartScreen
        # will warn on first run). To enable signing, add two SECURE vars
        # in the Codemagic UI:
        #   WINDOWS_CERT_P12      = base64 of your .pfx/.p12 file
        #                           (PowerShell: [Convert]::ToBase64String(
        #                            [IO.File]::ReadAllBytes("cert.pfx")))
        #   WINDOWS_CERT_PASSWORD = the .pfx export password
        script: |
          if ($env:WINDOWS_CERT_P12) {
            Write-Host "Decoding code signing certificate"
            $bytes = [System.Convert]::FromBase64String($env:WINDOWS_CERT_P12)
            [System.IO.File]::WriteAllBytes("$env:CM_BUILD_DIR\codesign.pfx", $bytes)
            $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
            if (-not $signtool) { Write-Host "ERROR: signtool.exe not found on runner"; exit 1 }
            echo "CODESIGN_PFX=$env:CM_BUILD_DIR\codesign.pfx" | Out-File -FilePath $env:CM_ENV -Append -Encoding utf8
            echo "SIGNTOOL=$signtool" | Out-File -FilePath $env:CM_ENV -Append -Encoding utf8
            Write-Host "Signing ready ($signtool)"
          } else {
            Write-Host "WINDOWS_CERT_P12 not set - build will be UNSIGNED (SmartScreen will warn)."
          }
      - name: Sign app executable
        # Sign the app binary BEFORE it gets bundled into the ZIP and the
        # installer, so the exe is trusted when launched after install.
        # Timestamping (/tr) keeps the signature valid after the cert
        # expires. No-op when no cert was provided.
        script: |
          if (-not $env:CODESIGN_PFX) { Write-Host "Skipping - no certificate."; exit 0 }
          & $env:SIGNTOOL sign /f $env:CODESIGN_PFX /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /d "Hermosa POS" "$env:BUILD_DIR\Hermosa.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # verify is informational — /pa fails for self-signed test certs
          # whose root isn't trusted on the runner; don't gate the build on it
          & $env:SIGNTOOL verify /pa "$env:BUILD_DIR\Hermosa.exe"
          exit 0
      - name: List build output
        script: dir build\windows\x64\runner\Release
        ignore_failure: true
      - name: Package as ZIP
        script: |
          cd build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath $env:CM_BUILD_DIR\hermosa-windows.zip -Force
      - name: Build Windows installer (Start Menu + desktop shortcut)
        # Compiles windows/installer/hermosa_pos.iss with Inno Setup into a
        # single setup .exe. The installer registers the app in Add/Remove
        # Programs, creates a Start Menu group, and (via the desktopicon
        # task) drops a desktop shortcut on install. Version is pulled from
        # pubspec.yaml so the installer metadata matches the marketing
        # version without a second place to bump.
        script: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $line = Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1
          $appVersion = ($line.Line -replace '^version:\s*', '') -replace '\+.*$', ''
          Write-Host "Building installer for version $appVersion"
          & $iscc "/DMyAppVersion=$appVersion" windows\installer\hermosa_pos.iss
      - name: Sign installer
        # Sign the final setup .exe — this is what users download, so it's
        # the signature SmartScreen checks. No-op when no cert was provided.
        script: |
          if (-not $env:CODESIGN_PFX) { Write-Host "Skipping - no certificate."; exit 0 }
          $setup = Get-ChildItem windows\installer\Output\*.exe | Select-Object -First 1
          if (-not $setup) { Write-Host "ERROR: Installer exe not found"; exit 1 }
          & $env:SIGNTOOL sign /f $env:CODESIGN_PFX /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /d "Hermosa POS Setup" $setup.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # verify is informational (see note in the app-signing step)
          & $env:SIGNTOOL verify /pa $setup.FullName
          exit 0
    artifacts:
      - hermosa-windows.zip
      - windows/installer/Output/*.exe
      - build/windows/x64/runner/Release/**/*.exe
      - build/windows/x64/runner/Release/**/*.dll
    publishing:
      email:
        recipients:
          - support@hermosaapp.com
        notify:
          success: true
          failure: true

  # =====================================================================
  # iOS workflow
  # =====================================================================
  # One-time Codemagic UI setup before the first run:
  #   1. Teams → Integrations → "App Store Connect"
  #      Connect with: Issuer ID, Key ID, and the .p8 private key file
  #      (download from App Store Connect → Users and Access → Keys).
  #      Name the integration EXACTLY:  codemagic_app_store
  #      (matches `integrations.app_store_connect` below).
  #   2. App settings → Environment variables, add a SECURE variable:
  #        APP_STORE_APPLE_ID = <numeric Apple ID of the app>
  #      Find it at App Store Connect → My Apps → Hermosa → App Information
  #      → "Apple ID" (e.g. 6745123456).
  #   3. Optional: add `DEVELOPER_CERT_PEM` (paste the full PEM file
  #      contents) so NearPay works in production builds. Without it,
  #      the build still succeeds and NearPay stays disabled at runtime.
  #
  # The first time this workflow runs, Codemagic uses your App Store
  # Connect API key to:
  #   • create / fetch a Distribution certificate,
  #   • create / fetch a provisioning profile for `com.hermosa.hermosaapp`,
  #   • upload the signed IPA to App Store Connect (TestFlight).
  # No Mac required on your end.
  # =====================================================================
  ios-workflow:
    name: Hermosa iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: codemagic_app_store

    environment:
      flutter: 3.41.1
      # Apple now rejects uploads built with anything older than the
      # iOS 26 SDK (Xcode 26+). Build #18 failed App Store Connect
      # validation with "SDK version issue. This app was built with
      # the iOS 18.2 SDK." Use Codemagic's `latest` Xcode image so we
      # always pick up whatever Xcode 26.x is current on the runner.
      xcode: latest
      cocoapods: default
      # NOTE: `ios_signing` block intentionally OMITTED. It auto-fetches
      # an existing provisioning profile but cannot CREATE one when none
      # exists yet (build #14 failed: "No matching profiles found").
      # We handle full create-or-fetch flow manually below using a
      # PERSISTENT private key stored in IOS_DIST_PRIVATE_KEY (secure
      # Codemagic env var), so the Distribution cert at Apple is reusable
      # across builds instead of being orphaned every run.
      groups:
        - default
      vars:
        BUNDLE_ID: "com.hermosa.hermosaapp"
        APP_STORE_APPLE_ID: $APP_STORE_APPLE_ID

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true

    scripts:
      - name: Set up code signing (App Store)
        script: |
          set -e
          keychain initialize

          # The Distribution-cert private key lives in the Codemagic
          # secure env var IOS_DIST_PRIVATE_KEY (uploaded once via API).
          # Persisting it across builds means: if the cert already
          # exists at Apple from a previous build, fetch-signing-files
          # finds the matching pair and reuses it; if not, it creates
          # a new cert against this same key, so future builds also
          # match. Either way no orphaned certs accumulate.
          #
          # Use python to write the file because Codemagic delivers
          # multi-line secure env vars with literal "\n" sequences in
          # some cases; printf would write those as backslash-n and
          # break PEM parsing.
          CERT_KEY=/tmp/cert_private_key.pem
          python3 - <<'PY'
          import os, sys
          key = os.environ.get("IOS_DIST_PRIVATE_KEY", "")
          if not key:
              sys.stderr.write("❌ IOS_DIST_PRIVATE_KEY env var missing\n")
              sys.exit(1)
          if "\\n" in key and "\n" not in key:
              key = key.replace("\\n", "\n")
          if not key.startswith("-----BEGIN"):
              sys.stderr.write(f"❌ key doesn't look like PEM. length={len(key)} first40={key[:40]!r}\n")
              sys.exit(1)
          if not key.endswith("\n"):
              key += "\n"
          with open("/tmp/cert_private_key.pem", "w") as f:
              f.write(key)
          os.chmod("/tmp/cert_private_key.pem", 0o600)
          print(f"✓ wrote {len(key)} bytes of cert key")
          PY

          echo "─── cert key sanity ───"
          head -1 "$CERT_KEY"
          tail -1 "$CERT_KEY"
          echo "lines=$(wc -l < $CERT_KEY) bytes=$(wc -c < $CERT_KEY)"
          echo "───────────────────────"

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --certificate-key=@file:"$CERT_KEY" \
              --create

          keychain add-certificates
          xcode-project use-profiles
          echo "✅ Code signing ready."

      - name: Resolve build number
        script: |
          set -e
          # Use Codemagic's own auto-incrementing $PROJECT_BUILD_NUMBER
          # (the Codemagic build #) instead of asking App Store Connect.
          # Every previous attempt to query Apple silently fell back to
          # 0 → 1 and collided with the already-uploaded build 1 (see
          # builds #20, #22, #23). $PROJECT_BUILD_NUMBER is monotonic
          # per workflow, so it always beats the previous successful
          # upload — and we're already past 20+.
          echo "BUILD_NUMBER=$PROJECT_BUILD_NUMBER" >> $CM_ENV
          echo "Using build number $PROJECT_BUILD_NUMBER (Codemagic counter)"

      - name: Restore NearPay developer cert (optional)
        script: |
          # See the Windows workflow above for context. The PEM file is
          # NOT committed to the repo; provide it via Codemagic secret
          # variable DEVELOPER_CERT_PEM if you want NearPay to work in
          # this build. Otherwise the runtime loader gracefully treats
          # NearPay as disabled.
          mkdir -p assets/certs
          if [ -n "$DEVELOPER_CERT_PEM" ]; then
            echo "ℹ️ Restoring developer_cert.pem from DEVELOPER_CERT_PEM secret"
            printf "%s" "$DEVELOPER_CERT_PEM" > assets/certs/developer_cert.pem
          else
            echo "⚠️ DEVELOPER_CERT_PEM not set — NearPay will run disabled in this build."
          fi

      - name: Flutter doctor
        script: flutter doctor -v

      - name: Get Flutter packages
        script: flutter pub get

      - name: Refresh TLS leaf pin from live cert
        script: |
          # portal.hermosaapp.com is fronted by Let's Encrypt, which rotates
          # the leaf cert every ~90 days. Without this step the Dart-side
          # `CertificatePinning.pinnedSha256Hashes` would go stale at
          # each release boundary; with it, every iOS build ships with
          # whatever leaf is currently being served.
          # `--apply` mutates the file in place; `flutter build` below
          # picks up the change. Failures here are NON-fatal so the
          # build still ships if the openssl probe is unreachable (the
          # existing pin is still valid for the remainder of its 90-day
          # window).
          bash scripts/refresh-cert-pins.sh --apply || \
            echo "⚠️ pin refresh failed; release will ship with existing pin"

      - name: Static analysis (blocks build on warnings/errors)
        script: flutter analyze

      - name: Unit + widget tests (blocks build on failure)
        # `flutter test` exits non-zero on any failing test, which fails
        # the Codemagic step automatically. Builds NEVER proceed with a
        # broken test suite — without this guard a regression introduced
        # on `main` would silently ship to TestFlight.
        script: flutter test

      - name: Receipt/print code-untouched gate (CLAUDE.md §1)
        # Code-level enforcement of the "never modify printing/receipt
        # code without explicit permission" hard constraint. Blocks the
        # build if commits in this push touched the off-limits files
        # without an ALLOW-PRINT-EDIT marker in their commit messages.
        # Promotes a CLAUDE.md convention into an enforced CI gate.
        script: bash scripts/check-print-untouched.sh

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios
          pod install --repo-update

      - name: Flutter build IPA
        script: |
          set -e
          # Pull marketing version from pubspec.yaml so App Store
          # Connect shows the correct CFBundleShortVersionString.
          BUILD_NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          flutter build ipa --release \
              --build-name="$BUILD_NAME" \
              --build-number="$BUILD_NUMBER" \
              --export-options-plist=/Users/builder/export_options.plist

      - name: Publish to App Store Connect (TestFlight)
        script: |
          set -e

          # The Codemagic `app_store_connect` integration already loads
          # the API key into the codemagic CLI's credential store, so
          # `app-store-connect publish` finds it without us writing the
          # .p8 file ourselves. (Earlier builds tried to materialize the
          # key from $APP_STORE_CONNECT_PRIVATE_KEY for altool, but that
          # env var is not exposed as raw PEM text — only the CLI sees
          # the credentials.)

          IPA=$(find "$CM_BUILD_DIR/build/ios/ipa" -name '*.ipa' -print -quit)
          if [ -z "$IPA" ]; then
            echo "❌ No IPA found under $CM_BUILD_DIR/build/ios/ipa"
            exit 1
          fi
          echo "Uploading $IPA to App Store Connect (TestFlight)…"

          app-store-connect publish \
              --path "$IPA" \
              --enable-package-validation
          echo "✅ Upload finished. Build will appear in TestFlight after Apple processing (5-30 min)."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      # Custom `Publish to App Store Connect` step above replaces the
      # built-in publishing block. We keep email notifications only.
      email:
        recipients:
          - support@hermosaapp.com
        notify:
          success: true
          failure: true
