workflows:
  windows-workflow:
    name: Hermosa Windows Build
    instance_type: windows_x2
    max_build_duration: 90
    environment:
      vars:
        FLUTTER_VERSION: "3.41.1"
        BUILD_DIR: "build\\windows\\x64\\runner\\Release"
    scripts:
      - name: Install Flutter 3.41.1 from Git
        script: |
          git clone https://github.com/flutter/flutter.git -b $env:FLUTTER_VERSION --depth 1 C:\flutter
          echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "C:\flutter\bin;" + $env:PATH
          C:\flutter\bin\flutter.bat --version
          C:\flutter\bin\flutter.bat precache --windows
      - name: Flutter doctor
        script: C:\flutter\bin\flutter.bat doctor -v
      - name: Enable Windows desktop
        script: C:\flutter\bin\flutter.bat config --enable-windows-desktop
      - name: Restore NearPay developer cert (optional)
        script: |
          # pubspec.yaml declares assets/certs/ as an asset bundle. The
          # real developer_cert.pem is not committed to the repo; if a
          # Codemagic secure variable named DEVELOPER_CERT_PEM is set,
          # materialize it here so NearPay works in the built binary.
          # Without the env var the build still succeeds (runtime loader
          # catches the missing cert and keeps NearPay disabled).
          New-Item -ItemType Directory -Force -Path assets\certs | Out-Null
          if ($env:DEVELOPER_CERT_PEM) {
            Write-Host "ℹ️ Restoring developer_cert.pem from DEVELOPER_CERT_PEM secret"
            [System.IO.File]::WriteAllText("assets\certs\developer_cert.pem", $env:DEVELOPER_CERT_PEM)
          } else {
            Write-Host "⚠️ DEVELOPER_CERT_PEM not set — NearPay will run disabled in this build."
          }
      - name: Clean project
        script: C:\flutter\bin\flutter.bat clean
      - name: Get Flutter packages
        script: C:\flutter\bin\flutter.bat pub get --verbose
      - name: Build Windows Release
        script: C:\flutter\bin\flutter.bat build windows --release --verbose
      - name: List build output
        script: dir build\windows\x64\runner\Release
        ignore_failure: true
      - name: Package as ZIP
        script: |
          cd build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath $env:CM_BUILD_DIR\hermosa-windows.zip -Force
    artifacts:
      - hermosa-windows.zip
      - build/windows/x64/runner/Release/**/*.exe
      - build/windows/x64/runner/Release/**/*.dll
    publishing:
      email:
        recipients:
          - support@hermosaapp.com
        notify:
          success: true
          failure: true

  # =====================================================================
  # iOS workflow
  # =====================================================================
  # One-time Codemagic UI setup before the first run:
  #   1. Teams → Integrations → "App Store Connect"
  #      Connect with: Issuer ID, Key ID, and the .p8 private key file
  #      (download from App Store Connect → Users and Access → Keys).
  #      Name the integration EXACTLY:  codemagic_app_store
  #      (matches `integrations.app_store_connect` below).
  #   2. App settings → Environment variables, add a SECURE variable:
  #        APP_STORE_APPLE_ID = <numeric Apple ID of the app>
  #      Find it at App Store Connect → My Apps → Hermosa → App Information
  #      → "Apple ID" (e.g. 6745123456).
  #   3. Optional: add `DEVELOPER_CERT_PEM` (paste the full PEM file
  #      contents) so NearPay works in production builds. Without it,
  #      the build still succeeds and NearPay stays disabled at runtime.
  #
  # The first time this workflow runs, Codemagic uses your App Store
  # Connect API key to:
  #   • create / fetch a Distribution certificate,
  #   • create / fetch a provisioning profile for `p.cash.hermosaapp.com`,
  #   • upload the signed IPA to App Store Connect (TestFlight).
  # No Mac required on your end.
  # =====================================================================
  ios-workflow:
    name: Hermosa iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: codemagic_app_store

    environment:
      flutter: 3.41.1
      xcode: 16.2
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: p.cash.hermosaapp.com
      vars:
        BUNDLE_ID: "p.cash.hermosaapp.com"
        # Set this in Codemagic UI as a *secret* variable. Read by the
        # publishing block below to attach the build to the correct
        # App Store Connect record. Numeric value, e.g. 6745123456.
        APP_STORE_APPLE_ID: $APP_STORE_APPLE_ID

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true

    scripts:
      - name: Set up code signing (App Store)
        script: |
          set -e
          keychain initialize

          # ---- Diagnostics ----------------------------------------------
          # When fetch-signing-files fails the message is opaque ("No
          # matching profiles found"). The most common causes are:
          #   1. The App Store Connect API key registered in Codemagic
          #      does not have Admin role — it cannot CREATE assets.
          #   2. The bundle ID is registered to a different team than
          #      the one the API key belongs to.
          #   3. The `integrations.app_store_connect` value does not
          #      match the integration name in Codemagic UI.
          # The next 3 commands surface what the API key CAN see, which
          # makes the failure actionable instead of cryptic.
          echo "→ Bundle IDs visible to this API key:"
          app-store-connect list-bundle-ids --filter-identifier "$BUNDLE_ID" || true
          echo "→ Distribution certificates visible to this API key:"
          app-store-connect list-certificates --type IOS_DISTRIBUTION || true
          echo "→ Provisioning profiles for $BUNDLE_ID:"
          app-store-connect list-profiles --bundle-id-identifier "$BUNDLE_ID" || true
          echo "----------------------------------------------------------"

          # If a Distribution cert doesn't exist yet, create one. We do
          # this explicitly (instead of relying on `--create` inside the
          # next step) so the error message is precise when this is the
          # blocker.
          app-store-connect certificates create \
              --type IOS_DISTRIBUTION \
              --save || echo "⚠️ certificate creation skipped (likely already exists)"

          # Same for the bundle ID — if it's not yet registered to this
          # team, register it. No-op if it already exists.
          app-store-connect bundle-ids register "$BUNDLE_ID" \
              --name "Hermosa POS" || echo "⚠️ bundle id registration skipped (likely already exists)"

          # Finally fetch / create the provisioning profile.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --create

          keychain add-certificates
          xcode-project use-profiles

      - name: Bump build number from App Store Connect
        script: |
          set -e
          # Pull the highest build number across TestFlight + App Store
          # for this app, then increment by 1. Keeps Codemagic builds
          # monotonic without us having to bump pubspec.yaml every time.
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          NEXT_BUILD=$(( LATEST_BUILD_NUMBER + 1 ))
          echo "Latest App Store build: $LATEST_BUILD_NUMBER → using $NEXT_BUILD"
          echo "BUILD_NUMBER=$NEXT_BUILD" >> $CM_ENV

      - name: Restore NearPay developer cert (optional)
        script: |
          # See the Windows workflow above for context. The PEM file is
          # NOT committed to the repo; provide it via Codemagic secret
          # variable DEVELOPER_CERT_PEM if you want NearPay to work in
          # this build. Otherwise the runtime loader gracefully treats
          # NearPay as disabled.
          mkdir -p assets/certs
          if [ -n "$DEVELOPER_CERT_PEM" ]; then
            echo "ℹ️ Restoring developer_cert.pem from DEVELOPER_CERT_PEM secret"
            printf "%s" "$DEVELOPER_CERT_PEM" > assets/certs/developer_cert.pem
          else
            echo "⚠️ DEVELOPER_CERT_PEM not set — NearPay will run disabled in this build."
          fi

      - name: Flutter doctor
        script: flutter doctor -v

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios
          pod install --repo-update

      - name: Flutter build IPA
        script: |
          set -e
          # Pull marketing version from pubspec.yaml so App Store
          # Connect shows the correct CFBundleShortVersionString.
          BUILD_NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          flutter build ipa --release \
              --build-name="$BUILD_NAME" \
              --build-number="$BUILD_NUMBER" \
              --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        # Upload to TestFlight automatically on every successful build.
        # Flip `submit_to_app_store` to true and set release_type when
        # you're ready to push a public release.
        submit_to_testflight: true
        beta_groups:
          - Internal QA
        submit_to_app_store: false
      email:
        recipients:
          - support@hermosaapp.com
        notify:
          success: true
          failure: true
