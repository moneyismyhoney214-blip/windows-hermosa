pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.11.1" apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
}

include ":app"

// NEARPAY MAVEN REPOSITORY
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven {
            url = uri("https://storage.googleapis.com/download.flutter.io")
        }
        
        // NearPay GitLab Maven Repository
        def nearpayToken = (
            providers.gradleProperty("nearpayPosGitlabReadToken")
                .orElse(providers.environmentVariable("NEARPAY_POS_GITLAB_READ_TOKEN"))
                .orNull ?: ""
        ).trim()
        
        if (!nearpayToken.isEmpty()) {
            maven {
                url = uri("https://gitlab.com/api/v4/projects/37026421/packages/maven")
                credentials(HttpHeaderCredentials) {
                    name = "Private-Token"
                    value = nearpayToken
                }
                authentication {
                    header(HttpHeaderAuthentication)
                }
            }
        } else {
            logger.warn("NearPay GitLab token is missing. Set nearpayPosGitlabReadToken in gradle.properties/local.properties or NEARPAY_POS_GITLAB_READ_TOKEN env var.")
        }
        
        maven { url = uri("https://jitpack.io") }
        maven { url = uri("https://developer.huawei.com/repo/") }
    }
}
